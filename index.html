<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Composite Laminate Analyzer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Composite Laminate Analyzer</h1>

    <div id="input-section">
        <h3>Add Layer</h3>
        <label>Material:
            <select id="material">
                <option value="carbon">Carbon/Epoxy</option>
                <option value="glass">Glass/Epoxy</option>
                <option value="kevlar">Kevlar/Epoxy</option>
            </select>
        </label>
        <label>Angle (deg):
            <input type="number" id="theta" value="0">
        </label>
        <label>Thickness (mm):
            <input type="number" id="thick" value="0.125">
        </label>
        <button onclick="addLayer()">Add Layer</button>
    </div>

    <table id="layupTable">
        <thead>
            <tr><th>#</th><th>Material</th><th>Angle</th><th>Thickness (m)</th></tr>
        </thead>
        <tbody></tbody>
    </table>

    <button onclick="calculateABD()">Compute ABD & Stress/Strain</button>

    <div id="results">
        <h3>Matrices</h3>
        <div id="A"></div>
        <div id="B"></div>
        <div id="D"></div>
        <div id="ABD"></div>
        <div id="abbd"></div>

        <h3>Tsai-Wu Failure Analysis</h3>
        <div id="failure"></div>

        <h3>Stress & Strain Profiles</h3>
        <div id="plots"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
