<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Composite ABD Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Composite Laminate Analyzer</h1>

    <h3>Add Layer</h3>
    <label>Angle (deg): <input type="number" id="theta" value="0"></label>
    <label>Thickness (mm): <input type="number" id="thick" value="0.125"></label>
    <button onclick="addLayer()">Add Layer</button>

    <table id="layupTable">
        <thead>
            <tr>
                <th>#</th>
                <th>Angle</th>
                <th>Thickness (m)</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <button onclick="calculateABD()">Compute ABD</button>

    <h3>A Matrix</h3>
    <div id="a-matrix"></div>

    <h3>B Matrix</h3>
    <div id="b-matrix"></div>

    <h3>D Matrix</h3>
    <div id="d-matrix"></div>

</div>

<script src="script.js"></script>
</body>
</html>
